name: Generate Quail IPA
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Clean Application Workspace Environment
        run: |
          # using purely lowercase folder names to prevent windows extraction bugs
          mkdir -p quail.app

      - name: Generate Custom Dynamic App Icon Assets
        run: |
          screencapture -R 0,0,10,10 raw_patch.png
          sips -z 120 120 raw_patch.png --out quail.app/icon60x60@2x.png
          rm raw_patch.png

      - name: Compile Separated App Code Module
        run: |
          # compile binary matching the exact lowercase target name
          xcrun -sdk iphoneos swiftc -target arm64-apple-ios15.0 quail.swift -o quail
          mv quail quail.app/quail

      - name: Generate App Manifest Target Property Dictionary
        run: |
          cat << 'EOF' > quail.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>quail</string>
              <key>CFBundleIdentifier</key>
              <string>com.quail.musicplayer</string>
              <key>CFBundleName</key>
              <string>quail</string>
              <key>CFBundleIconFiles</key>
              <array>
                  <string>icon60x60</string>
              </array>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIBackgroundModes</key>
              <array>
                  <string>audio</string>
              </array>
              <key>NSAppleMusicUsageDescription</key>
              <string>quail needs permissions to stream audio files from your music library container.</string>
              <key>UILaunchStoryboardName</key>
              <string></string>
          </dict>
          </plist>
          EOF

      - name: Finalize Compressed Production IPA Bundle Archive
        run: |
          mkdir -p Payload
          cp -r quail.app Payload/
          zip -r quail.ipa Payload

      - name: Deliver Compiled IPA Package File
        uses: actions/upload-artifact@v4
        with:
          name: Quail-iOS-Bundle
          path: quail.ipa
