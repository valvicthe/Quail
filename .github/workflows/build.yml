name: Generate Quail IPA
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Clean Application Workspace Environment
        run: |
          mkdir -p quail.app

      # ... previous steps (Checkout, etc.) ...

      - name: Generate Custom Dynamic App Icon Assets
        run: |
          
          # silently captures a tiny blank corner of the virtual display
          screencapture -R 0,0,10,10 raw_patch.png
          
          # uses native sips tool to process the patch into a clean 120x120 solid icon
          sips -z 120 120 raw_patch.png --setProp "colorspace" "RGB" --out quail.app/AppIcon60x60@2x.png
          
          # clean up the temporary workspace file
          rm raw_patch.png

      # ... continues to compile separated app code module ...
      - name: Compile Separated App Code Module
        run: |
          # compiles directly against external file module targets via system frameworks mappings
          xcrun -sdk iphoneos swiftc -target arm64-apple-ios15.0 quail.swift -o QuailExecutable
          mv QuailExecutable quail.app/Quail

      - name: Generate App Manifest Target Property Dictionary
        run: |
          cat << 'EOF' > quail.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>quail</string>
              <key>CFBundleIdentifier</key>
              <string>com.quail.app</string>
              <key>CFBundleName</key>
              <string>quail</string>
              <key>CFBundleIconFiles</key>
              <array>
                  <string>AppIcon60x60</string>
              </array>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIBackgroundModes</key>
              <array>
                  <string>audio</string>
              </array>
              <key>NSAppleMusicUsageDescription</key>
              <string>quail needs permissions to stream audio files from your music library container.</string>
              <key>UILaunchStoryboardName</key>
              <string></string>
          </dict>
          </plist>
          EOF

      - name: Finalize Compressed Production IPA Bundle Archive
        run: |
          mkdir -p Payload
          cp -r quail.app Payload/
          zip -r quail.ipa Payload

      - name: Deliver Compiled IPA Package File
        uses: actions/upload-artifact@v4
        with:
          name: quail-iOS-Bundle
          path: quail.ipa
