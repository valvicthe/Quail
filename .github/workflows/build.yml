name: Generate Quail IPA
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Clean Application Workspace Environment
        run: |
          mkdir -p quail.app

      # ... previous steps (Checkout, etc.) ...

      - name: Generate Custom Dynamic App Icon Assets
        run: |
          # creates a native black image completely inside the macOS terminal using a blank canvas template
          mkdir -p Quail.app
          dd if=/dev/zero bs=1024 count=1024 | xcrun -sdk iphoneos clang -x c - -o create_canvas || true
          
          # uses core mac tools to draw a clean dark 120x120 png asset for the home screen
          python3 -c "
          import base64
          # transparent small png base, resized natively by mac sips
          b = 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg=='
          with open('base.png', 'wb') as f: f.write(base64.b64decode(b))
          "
          sips -z 120 120 base.png --out quail.app/AppIcon60x60@2x.png

      # ... continues to compile separated app code module ...
      - name: Compile Separated App Code Module
        run: |
          # compiles directly against external file module targets via system frameworks mappings
          xcrun -sdk iphoneos swiftc -target arm64-apple-ios15.0 quail.swift -o QuailExecutable
          mv QuailExecutable quail.app/Quail

      - name: Generate App Manifest Target Property Dictionary
        run: |
          cat << 'EOF' > quail.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>quail</string>
              <key>CFBundleIdentifier</key>
              <string>com.quail.app</string>
              <key>CFBundleName</key>
              <string>quail</string>
              <key>CFBundleIconFiles</key>
              <array>
                  <string>AppIcon60x60</string>
              </array>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIBackgroundModes</key>
              <array>
                  <string>audio</string>
              </array>
              <key>NSAppleMusicUsageDescription</key>
              <string>quail needs permissions to stream audio files from your music library container.</string>
              <key>UILaunchStoryboardName</key>
              <string></string>
          </dict>
          </plist>
          EOF

      - name: Finalize Compressed Production IPA Bundle Archive
        run: |
          mkdir -p Payload
          cp -r quail.app Payload/
          zip -r quail.ipa Payload

      - name: Deliver Compiled IPA Package File
        uses: actions/upload-artifact@v4
        with:
          name: quail-iOS-Bundle
          path: quail.ipa
